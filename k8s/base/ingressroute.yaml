---
# Traefik IngressRoutes for catalyst-llm services
# Access via: http://<service>.talos00
#
# Requires /etc/hosts entry:
#   192.168.1.54  openwebui.talos00 lobechat.talos00 sillytavern.talos00 searxng.talos00

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: open-webui
  namespace: catalyst-llm
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/part-of: catalyst-llm
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`openwebui.talos00`)
      kind: Rule
      services:
        - name: open-webui
          port: 8080
---
apiVersion: traefik.io/v1alpha1
