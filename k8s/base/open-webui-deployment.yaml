---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: catalyst-llm
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/component: chat-ui
    app.kubernetes.io/part-of: catalyst-llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: open-webui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: open-webui
        app.kubernetes.io/component: chat-ui
        app.kubernetes.io/part-of: catalyst-llm
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # Ollama connection - configurable via configmap/secret
            - name: OLLAMA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: catalyst-llm-config
                  key: OLLAMA_BASE_URL
            # Disable telemetry
            - name: SCARF_NO_ANALYTICS
              value: "true"
            - name: DO_NOT_TRACK
              value: "true"
            # Auth settings
            - name: WEBUI_AUTH
              value: "true"
            # API settings
            - name: ENABLE_OPENAI_API
              value: "false"
            - name: ENABLE_OLLAMA_API
              value: "true"
            # RAG settings
            - name: RAG_EMBEDDING_MODEL
              value: "sentence-transformers/all-MiniLM-L6-v2"
            - name: CHUNK_SIZE
              value: "1000"
            - name: CHUNK_OVERLAP
              value: "100"
            # Web Search via SearXNG
            - name: ENABLE_RAG_WEB_SEARCH
              value: "true"
            - name: RAG_WEB_SEARCH_ENGINE
              value: "searxng"
            - name: SEARXNG_QUERY_URL
              value: "http://searxng:8080/search?q=<query>"
            - name: RAG_WEB_SEARCH_RESULT_COUNT
              value: "5"
            - name: RAG_WEB_SEARCH_CONCURRENT_REQUESTS
              value: "5"
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: open-webui-data
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: catalyst-llm
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/component: chat-ui
    app.kubernetes.io/part-of: catalyst-llm
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: open-webui
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui-data
  namespace: catalyst-llm
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/component: chat-ui
    app.kubernetes.io/part-of: catalyst-llm
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
