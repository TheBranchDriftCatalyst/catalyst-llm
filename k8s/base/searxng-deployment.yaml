---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: catalyst-llm
  labels:
    app.kubernetes.io/name: searxng
    app.kubernetes.io/component: search-engine
    app.kubernetes.io/part-of: catalyst-llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: searxng
  template:
    metadata:
      labels:
        app.kubernetes.io/name: searxng
        app.kubernetes.io/component: search-engine
        app.kubernetes.io/part-of: catalyst-llm
    spec:
      securityContext:
        runAsUser: 977
        runAsGroup: 977
        fsGroup: 977
      containers:
        - name: searxng
          image: searxng/searxng:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SEARXNG_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: catalyst-llm-config
                  key: SEARXNG_BASE_URL
          volumeMounts:
            - name: config
              mountPath: /etc/searxng
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - SETGID
                - SETUID
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: searxng-config
---
apiVersion: v1
kind: Service
metadata:
  name: searxng
  namespace: catalyst-llm
  labels:
    app.kubernetes.io/name: searxng
    app.kubernetes.io/component: search-engine
    app.kubernetes.io/part-of: catalyst-llm
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: searxng
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
